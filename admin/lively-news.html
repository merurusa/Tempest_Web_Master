<!doctype html>
<html lang="ja">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Lively News Admin | Tempest</title><link rel="stylesheet" href="../styles.css?v=20260709-0915"></head>
  <body class="admin-page admin-lively">
    <header class="site-header"><a class="admin-back-button" href="lively.html" aria-label="Back">&lsaquo;</a><a class="brand" href="lively.html"><span class="brand-mark">T</span><span>Lively News</span></a><nav class="nav"><a href="lively.html">Dashboard</a><a href="index.html">Logout</a></nav></header>
    <main class="admin-shell">
      <section class="admin-hero"><h1>News Edit</h1></section>
      <section class="admin-edit-panel panel">
        <form class="admin-news-form">
          <label class="admin-upload-box"><span>Post image</span><input name="newsImage" type="file" accept="image/*"><strong>Upload image</strong><small>Poster or screenshot image</small></label>
          <label><span>Date</span><input name="newsDate" type="date"></label>
          <label><span>Title</span><input name="newsTitle" type="text" placeholder="News title"></label>
          <label><span>Body</span><textarea name="newsBody" rows="8" placeholder="News body"></textarea></label>
          <label><span>Status</span><select name="newsVisible"><option selected>Show</option><option>Hide</option></select></label>
          <button type="button" class="admin-primary-button admin-confirm-button">Save</button>
        </form>
      </section>
      <section class="admin-secondary-actions"><a class="admin-secondary-button" href="lively-news-archive.html">Past archive</a></section>
    </main>
    <footer class="site-footer"><span>Lively News Admin</span><a href="lively.html">Dashboard</a></footer>
    <script type="module" src="../scripts/tempest-news-admin.js?v=20260709-0915"></script>
  </body>
</html>
