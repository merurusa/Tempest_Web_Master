<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>アクセス解析 | Tempest</title>
    <link rel="stylesheet" href="../styles.css?v=20260714-analytics">
  </head>
  <body class="admin-page admin-master">
    <header class="site-header">
      <a class="admin-back-button" href="master.html" aria-label="戻る">‹</a>
      <a class="brand" href="master.html"><span class="brand-mark">T</span><span>アクセス解析</span></a>
      <nav class="nav"><a href="master.html">マスター管理</a><a href="index.html">ログアウト</a></nav>
    </header>
    <main class="admin-shell">
      <section class="admin-hero">
        <h1>アクセス解析</h1>
        <p>公開ページの閲覧数、店舗別、流入元、よく見られているページを確認できます。</p>
      </section>

      <section class="panel analytics-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Analytics</p>
            <h2>概要</h2>
          </div>
          <p data-analytics-status>読み込み待機中...</p>
        </div>
        <div class="analytics-kpi-grid" data-analytics-summary></div>
      </section>

      <section class="analytics-grid">
        <article class="panel analytics-panel">
          <p class="eyebrow">Stores</p>
          <h2>店舗別</h2>
          <div class="analytics-list" data-analytics-stores></div>
        </article>
        <article class="panel analytics-panel">
          <p class="eyebrow">Source</p>
          <h2>流入元</h2>
          <div class="analytics-list" data-analytics-sources></div>
        </article>
        <article class="panel analytics-panel">
          <p class="eyebrow">Pages</p>
          <h2>ページ別</h2>
          <div class="analytics-list" data-analytics-pages></div>
        </article>
        <article class="panel analytics-panel">
          <p class="eyebrow">Recent</p>
          <h2>最近のアクセス</h2>
          <div class="analytics-list" data-analytics-recent></div>
        </article>
      </section>

      <section class="panel analytics-panel">
        <p class="eyebrow">Google Analytics</p>
        <h2>GA4</h2>
        <p>より細かいデータはGoogle Analytics側で確認できます。</p>
        <a class="admin-primary-button analytics-external-link" href="https://analytics.google.com/" target="_blank" rel="noopener">Google Analyticsを開く</a>
      </section>
    </main>
    <footer class="site-footer"><span>アクセス解析</span><a href="master.html">マスター管理へ</a></footer>
    <script type="module" src="../scripts/tempest-analytics-admin.js?v=20260714-analytics"></script>
  </body>
</html>
