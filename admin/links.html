<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Links Admin | Tempest</title>
    <link rel="stylesheet" href="../styles.css?v=20260708-0819">
  </head>
  <body class="admin-page">
    <header class="site-header">
      <a class="admin-back-button" href="master.html" aria-label="Back">‹</a>
      <a class="brand" href="master.html"><span class="brand-mark">T</span><span>Links Admin</span></a>
      <nav class="nav"><a href="master.html">Master</a><a href="index.html">Logout</a></nav>
    </header>

    <main class="admin-shell">
      <section class="admin-hero">
        <h1>Links</h1>
      </section>

      <section class="admin-edit-panel panel">
        <h2>各種SNS</h2>
        <form class="admin-news-form">
          <label><span>X</span><input type="url" placeholder="https://x.com/"></label>
          <label><span>Instagram</span><input type="url" placeholder="https://www.instagram.com/"></label>
          <label><span>TikTok</span><input type="url" placeholder="https://www.tiktok.com/@"></label>
          <button type="button" class="admin-primary-button admin-confirm-button">確定</button>
        </form>
      </section>

      <section class="admin-edit-panel panel">
        <h2>公式App</h2>
        <form class="admin-news-form">
          <label><span>App Store</span><input type="url" placeholder="https://apps.apple.com/"></label>
          <label><span>Google Play</span><input type="url" placeholder="https://play.google.com/store/apps/"></label>
          <button type="button" class="admin-primary-button admin-confirm-button">確定</button>
        </form>
      </section>
    </main>

    <footer class="site-footer"><span>Links Admin</span><a href="master.html">Master</a></footer>
  </body>
</html>
