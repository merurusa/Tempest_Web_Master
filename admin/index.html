<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin | Tempest</title>
    <link rel="stylesheet" href="../styles.css?v=20260708-0819">
  </head>
  <body class="admin-page">
    <header class="site-header"><a class="admin-back-button" href="../index.html" aria-label="Back">‹</a>
      <a class="brand" href="../index.html"><span class="brand-mark">T</span><span>Tempest Admin</span></a>
      <nav class="nav"><a href="../index.html">Site</a></nav>
    </header>
    <main class="admin-shell">
      <section class="admin-hero">
        
        <h1>Login</h1>
        
      </section>
      <section class="admin-login-panel">
        <div class="panel">
          
          <h2>Admin Login</h2>
          <form class="admin-form-grid" id="admin-login-form">
            <label><span>ID</span><input id="admin-id" type="text" placeholder="solomon" autocomplete="username"></label>
            <label><span>Password</span><input id="admin-password" type="password" inputmode="numeric" minlength="6" placeholder="000000" autocomplete="current-password"></label>
            <button type="submit" class="admin-primary-button">Login</button>
            <p class="admin-login-message" id="admin-login-message" aria-live="polite"></p>
          </form>
        </div>
      </section>
      <section class="admin-menu-grid" aria-label="test login ids">
        <div class="admin-menu-card"><span>ID</span><strong>various</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>solomon</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>lively</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>charme</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>strive</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>ebichanchi</strong></div>
        <div class="admin-menu-card"><span>ID</span><strong>master</strong></div>
      </section>
    </main>
    <footer class="site-footer"><span>Admin Preview</span><a href="../index.html">Top</a></footer>
    <script type="module" src="../scripts/tempest-admin-login.js?v=20260709-0845"></script>
  </body>
</html>
