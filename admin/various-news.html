<!doctype html>
<html lang="ja">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Various ニュース管理 | Tempest</title><link rel="stylesheet" href="../styles.css?v=20260709-0915"></head>
  <body class="admin-page admin-various">
    <header class="site-header"><a class="admin-back-button" href="various.html" aria-label="戻る">‹</a><a class="brand" href="various.html"><span class="brand-mark">T</span><span>Various ニュース</span></a><nav class="nav"><a href="various.html">管理TOP</a><a href="index.html">ログアウト</a></nav></header>
    <main class="admin-shell">
      <section class="admin-hero"><h1>ニュース編集</h1></section>
      <section class="admin-edit-panel panel">
        <form class="admin-news-form">
          <label class="admin-upload-box"><span>画像</span><input name="newsImage" type="file" accept="image/*"><strong>画像を選択</strong><small>ポスターやスクリーンショット画像</small></label>
          <label><span>Date</span><input name="newsDate" type="date"></label>
          <label><span>タイトル</span><input name="newsTitle" type="text" placeholder="タイトル"></label>
          <label><span>本文</span><textarea name="newsBody" rows="8" placeholder="本文"></textarea></label>
          <label><span>役割</span><select name="newsVisible"><option selected>Show</option><option>Hide</option></select></label>
          <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
        </form>
      </section>
      <section class="admin-secondary-actions"><a class="admin-secondary-button" href="various-news-archive.html">Past archive</a></section>
    </main>
    <footer class="site-footer"><span>Various News Admin</span><a href="various.html">管理TOP</a></footer>
    <script type="module" src="../scripts/tempest-news-admin.js?v=20260709-0915"></script>
  </body>
</html>
