<!doctype html>
<html lang="ja">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Strive Cast Edit | Tempest</title><link rel="stylesheet" href="../styles.css?v=20260709-0945"></head>
  <body class="admin-page admin-strive">
    <header class="site-header"><a class="admin-back-button" href="strive-cast.html" aria-label="Back">&lsaquo;</a><a class="brand" href="strive-cast.html"><span class="brand-mark">T</span><span>Strive Cast Edit</span></a><nav class="nav"><a href="strive-cast.html">Cast</a><a href="strive.html">Dashboard</a></nav></header>
    <main class="admin-shell"><section class="admin-hero"><h1>Cast</h1></section><section class="admin-edit-panel panel"><form class="admin-cast-form">
      <label class="admin-upload-box"><span>Cast image</span><input name="castImage" type="file" accept="image/*"><strong>Upload image</strong><small>List and profile photo</small></label>
      <div class="admin-cast-image-tools"><div class="admin-cast-preview-frame image-pos-center"><span>Preview</span></div><div class="admin-image-position-fields"><label><span>Image position</span><select name="imagePosition"><option value="image-pos-center">Center</option><option value="image-pos-top">Top</option><option value="image-pos-bottom">Bottom</option><option value="image-pos-left">Left</option><option value="image-pos-right">Right</option></select></label><small>画像の見える位置を調整できます。</small></div></div>
      <label><span>Status</span><select name="role"><option>Manager</option><option>Cast</option><option>Boy</option><option>Reader</option><option>Coming soon</option></select></label>
      <label class="admin-toggle-row"><span>Cast page link</span><input type="checkbox" name="linkEnabled"><em>ON / selectable</em></label>
      <label><span>Name</span><input name="name" type="text" placeholder="Cast name"></label>
      <label><span>Height</span><input name="height" type="text" placeholder="160cm"></label>
      <label><span>Birthday</span><input name="birthday" type="text" placeholder="01/01"></label>
      <label><span>Hobby</span><input name="hobby" type="text" placeholder="Hobby"></label>
      <label><span>X URL</span><input name="xUrl" type="url" placeholder="https://x.com/account"></label>
      <label><span>Instagram URL</span><input name="instagramUrl" type="url" placeholder="https://instagram.com/account"></label>
      <label><span>TikTok URL</span><input name="tiktokUrl" type="url" placeholder="https://www.tiktok.com/@account"></label>
      <button type="button" class="admin-primary-button admin-confirm-button">Save</button>
    </form></section></main>
    <footer class="site-footer"><span>Strive Cast Edit</span><a href="strive-cast.html">Cast List</a></footer>
    <script type="module" src="../scripts/tempest-cast-admin.js?v=20260709-0945"></script>
  </body>
</html>
