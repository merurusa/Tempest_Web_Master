<!doctype html>
<html lang="ja">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Solomon キャスト編集 | Tempest</title><link rel="stylesheet" href="../styles.css?v=20260709-0945"></head>
  <body class="admin-page admin-solomon">
    <header class="site-header"><a class="admin-back-button" href="solomon-cast.html" aria-label="戻る">‹</a><a class="brand" href="solomon-cast.html"><span class="brand-mark">T</span><span>Solomon キャスト編集</span></a><nav class="nav"><a href="solomon-cast.html">キャスト</a><a href="solomon.html">管理TOP</a></nav></header>
    <main class="admin-shell"><section class="admin-hero"><h1>キャスト</h1></section><section class="admin-edit-panel panel"><form class="admin-cast-form">
      <label class="admin-upload-box"><span>キャスト画像</span><input name="castImage" type="file" accept="image/*"><strong>画像を選択</strong><small>一覧とプロフィール用の写真</small></label>
      <div class="admin-cast-image-tools"><div class="admin-cast-preview-frame image-pos-center"><span>プレビュー</span></div><div class="admin-image-position-fields"><label><span>画像の位置</span><select name="imagePosition"><option value="image-pos-center">中央</option><option value="image-pos-top">Top</option><option value="image-pos-bottom">下</option><option value="image-pos-left">左</option><option value="image-pos-right">右</option></select></label><small>画像の見える位置を調整できます。</small></div></div>
      <label><span>役割</span><select name="role"><option>店長</option><option>キャスト</option><option>Boy</option><option>リーダー</option><option>Coming soon</option></select></label>
      <label class="admin-toggle-row"><span>キャストページリンク</span><input type="checkbox" name="linkEnabled"><em>ON / 選択可能</em></label>
      <label><span>名前</span><input name="name" type="text" placeholder="キャスト名"></label>
      <label><span>身長</span><input name="height" type="text" placeholder="160cm"></label>
      <label><span>誕生日</span><input name="birthday" type="text" placeholder="01/01"></label>
      <label><span>趣味</span><input name="hobby" type="text" placeholder="Hobby"></label>
      <label><span>X URL</span><input name="xUrl" type="url" placeholder="https://x.com/account"></label>
      <label><span>Instagram URL</span><input name="instagramUrl" type="url" placeholder="https://instagram.com/account"></label>
      <label><span>TikTok URL</span><input name="tiktokUrl" type="url" placeholder="https://www.tiktok.com/@account"></label>
      <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
    </form></section></main>
    <footer class="site-footer"><span>Solomon キャスト編集</span><a href="solomon-cast.html">キャスト一覧</a></footer>
    <script type="module" src="../scripts/tempest-cast-admin.js?v=20260709-0945"></script>
  </body>
</html>
