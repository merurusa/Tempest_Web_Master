<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>画像管理 | Tempest</title>
    <link rel="stylesheet" href="../styles.css?v=20260720-slider">
  </head>
  <body class="admin-page admin-master">
    <header class="site-header">
      <a class="admin-back-button" href="master.html" aria-label="戻る">‹</a>
      <a class="brand" href="master.html"><span class="brand-mark">T</span><span>画像管理</span></a>
      <nav class="nav"><a href="master.html">マスター管理</a><a href="index.html">ログアウト</a></nav>
    </header>
    <main class="admin-image-shell">
      <section class="admin-hero">
        <h1>画像管理</h1>
        <p>TOP画像、店舗バナー、Appアイコン、TOPスライドバナーを変更できます。</p>
      </section>

      <section class="admin-image-control panel">
        <h2>基本画像を変更</h2>
        <form class="admin-images-form">
          <div class="admin-image-control-grid">
            <label><span>変更場所</span><select name="imageKey">
              <option value="topHero">TOPメイン</option>
              <option value="topVarious">Variousバナー</option>
              <option value="topSolomon">Solomonバナー</option>
              <option value="topLively">Livelyバナー</option>
              <option value="topCharme">Charmeバナー</option>
              <option value="topStrive">Striveバナー</option>
              <option value="topEbichanchi">えびちゃん家バナー</option>
              <option value="appIcon">Appアイコン</option>
            </select></label>
            <label><span>画像ファイル</span><input name="imageFile" type="file" accept="image/*"></label>
          </div>
          <div class="admin-image-live-preview"><span>現在の登録画像はありません</span></div>
          <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
        </form>
      </section>

      <section class="admin-image-control panel">
        <h2>TOPスライドバナー</h2>
        <p class="admin-help-text">アプリ紹介の上に表示される横長バナーです。推奨サイズは1200×500px。</p>
        <form class="admin-slider-form" data-slide-index="1">
          <h3>スライド 01</h3>
          <label><span>画像</span><input name="slideImage" type="file" accept="image/*"></label>
          <label><span>リンクURL</span><input name="linkUrl" type="url" placeholder="https://example.com"></label>
          <label class="admin-toggle-row"><span>表示する</span><input name="visible" type="checkbox" checked><em>ON / OFF</em></label>
          <div class="admin-slider-preview"><span>プレビュー</span></div>
          <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
        </form>
        <form class="admin-slider-form" data-slide-index="2">
          <h3>スライド 02</h3>
          <label><span>画像</span><input name="slideImage" type="file" accept="image/*"></label>
          <label><span>リンクURL</span><input name="linkUrl" type="url" placeholder="https://example.com"></label>
          <label class="admin-toggle-row"><span>表示する</span><input name="visible" type="checkbox" checked><em>ON / OFF</em></label>
          <div class="admin-slider-preview"><span>プレビュー</span></div>
          <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
        </form>
        <form class="admin-slider-form" data-slide-index="3">
          <h3>スライド 03</h3>
          <label><span>画像</span><input name="slideImage" type="file" accept="image/*"></label>
          <label><span>リンクURL</span><input name="linkUrl" type="url" placeholder="https://example.com"></label>
          <label class="admin-toggle-row"><span>表示する</span><input name="visible" type="checkbox" checked><em>ON / OFF</em></label>
          <div class="admin-slider-preview"><span>プレビュー</span></div>
          <button type="button" class="admin-primary-button admin-confirm-button">保存</button>
        </form>
      </section>
    </main>
    <footer class="site-footer"><span>画像管理</span><a href="master.html">マスター管理へ</a></footer>
    <script type="module" src="../scripts/tempest-master-images-admin.js?v=20260720-slider"></script>
  </body>
</html>
